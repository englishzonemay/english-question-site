<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <title>English Zone - 질문지 생성기</title>
  </head>
  <body>
    <div id="root"></div>
    <noscript><p style="padding:40px;font-size:18px;">JavaScript를 활성화해주세요.</p></noscript>
    <script>
      window.onerror = function(msg, url, line, col, err) {
        document.getElementById('root').innerHTML =
          '<div style="padding:40px;font-family:sans-serif">' +
          '<h2 style="color:#C26A60">JS Error</h2>' +
          '<pre style="margin-top:12px;padding:16px;background:#f5f5f5;border-radius:8px;font-size:13px;overflow:auto">' +
          msg + '\n' + url + ':' + line + ':' + col +
          (err && err.stack ? '\n\n' + err.stack : '') +
          '</pre></div>';
      };
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
